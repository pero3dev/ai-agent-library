# CI(WEBSITE-PLAN §8 W5): markdownlint + サイトビルド(+ 条件付き GitHub Pages デプロイ)
#
# デプロイは既定で無効。有効化するにはリポジトリの Actions 変数(Settings → Secrets and variables → Actions → Variables)に
#   DEPLOY_PAGES = true
#   SITE_URL     = 公開 URL(例: https://<owner>.github.io/ai-agent-library)
#   SITE_BASE_PATH = サブパス(例: /ai-agent-library。ルート配信なら未設定)
# を設定し、Settings → Pages → Source を「GitHub Actions」にする。
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: markdownlint
        run: npx --yes markdownlint-cli "**/*.md" -p .markdownlintignore

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: website
      - name: Build (static export)
        run: npm run build
        working-directory: website
        env:
          STATIC_EXPORT: '1'
          NEXT_PUBLIC_BASE_PATH: ${{ vars.SITE_BASE_PATH || '' }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || '' }}
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/out

  deploy:
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_PAGES == 'true'
    needs: [lint, build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
